<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Todoist Gantt Chart logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e85c4a"/>
      <stop offset="1" stop-color="#c83b2e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square backdrop. Corner radius slightly tighter than Todoist's
       (so it reads as a different mark) and a vertical gradient instead of a
       flat fill. -->
  <rect x="3" y="3" width="58" height="58" rx="13" fill="url(#bg)"/>
  <!-- Three staggered Gantt bars (instead of checklist rows) — signals a
       timeline rather than a to-do list. -->
  <rect x="12" y="16"   width="34" height="7" rx="2" fill="#ffffff"/>
  <rect x="20" y="28.5" width="28" height="7" rx="2" fill="#ffffff" fill-opacity="0.92"/>
  <rect x="14" y="41"   width="22" height="7" rx="2" fill="#ffffff" fill-opacity="0.85"/>
</svg>
