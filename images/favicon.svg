<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Simplified favicon: solid fill (no gradient, cleaner at 16x16) and
       slightly chunkier bars than the full logo so they survive
       rasterization at small sizes. -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="#d94536"/>
  <rect x="12" y="17"   width="36" height="8" rx="2" fill="#ffffff"/>
  <rect x="20" y="28"   width="28" height="8" rx="2" fill="#ffffff"/>
  <rect x="14" y="39"   width="22" height="8" rx="2" fill="#ffffff"/>
</svg>
