server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Compress text assets.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript
                      application/json image/svg+xml;

    # ------------------------------------------------------------------
    # Same-origin proxy to the Todoist REST API.
    #
    # Requests from the browser go to /api/... on our own origin, so
    # the browser never has to negotiate CORS with api.todoist.com.
    # nginx resolves the hostname at startup (no external resolver
    # directive needed), which is reliable inside Docker.
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass         https://api.todoist.com/;
        proxy_ssl_server_name on;
        proxy_set_header   Host api.todoist.com;
        proxy_set_header   User-Agent "Ganttist/1.0";
        proxy_http_version 1.1;
        proxy_pass_request_headers on;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Long cache for versioned static assets.
    location ~* \.(?:css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # index.html should always be revalidated so updates reach users.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page fallback (harmless for this app, useful later).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' https://cdn.jsdelivr.net; \
        style-src  'self' https://cdn.jsdelivr.net 'unsafe-inline'; \
        img-src    'self' data:; \
        connect-src 'self' https://api.todoist.com; \
        font-src   'self' https://cdn.jsdelivr.net; \
        base-uri   'self'; \
        form-action 'self'" always;
}
