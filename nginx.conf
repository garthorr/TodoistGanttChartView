server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Compress text assets.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript
                      application/json image/svg+xml;

    # Long cache for versioned static assets.
    location ~* \.(?:css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # index.html should always be revalidated so updates reach users.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page fallback (harmless for this app, useful later).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers. (The app calls api.todoist.com and loads
    # Frappe Gantt from jsDelivr, so CSP allows both.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; \
        script-src 'self' https://cdn.jsdelivr.net; \
        style-src  'self' https://cdn.jsdelivr.net 'unsafe-inline'; \
        img-src    'self' data:; \
        connect-src 'self' https://api.todoist.com; \
        font-src   'self' https://cdn.jsdelivr.net; \
        frame-src  https://todoist.com https://app.todoist.com; \
        base-uri   'self'; \
        form-action 'self'" always;
}
